apiVersion: v1
kind: Secret
metadata:
  name: task-management-secret
  namespace: task-management
type: Opaque
# ⚠️  DO NOT commit real values — use Sealed Secrets or GitHub Actions to inject
# To encode: echo -n "your-value" | base64
# To decode: echo "encoded" | base64 -d
stringData:
  DATABASE_URL: "postgresql://tmuser:CHANGE_ME@postgres-service:5432/taskmanagement?schema=public"
  POSTGRES_USER: "tmuser"
  POSTGRES_PASSWORD: "CHANGE_ME"
  REDIS_PASSWORD: "CHANGE_ME"
  JWT_ACCESS_SECRET: "CHANGE_ME_min_64_chars"
  JWT_REFRESH_SECRET: "CHANGE_ME_min_64_chars"

